name: Compliance Reminder

on:
  workflow_dispatch:
  schedule:
    - cron: "23 8 * * *"

jobs:
  reminder:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: pip install -r requirements.txt

      - name: Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          FOUNDERS_JSON: ${{ secrets.FOUNDERS_JSON }}
        run: python reminder.py

      - name: Upload debug file
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-log
          path: debug_*.txt
